name: sdist

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  python-sdist:
    name: python-sdist
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python sdist
        shell: bash
        env:
          TMPDIR: /tmp/mujoco-sdist
        run: |
          rm -rf "${TMPDIR}" python/dist
          mkdir -p "${TMPDIR}"
          python -m venv "${TMPDIR}/venv"
          source "${TMPDIR}/venv/bin/activate"
          cd python
          bash make_sdist.sh

      - name: Upload Python sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/mujoco-*.tar.gz
          if-no-files-found: error
          retention-days: 5

      - name: Publish Python sdist release
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: main-sdist-${{ github.sha }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" python/dist/mujoco-*.tar.gz --clobber
          else
            gh release create "${RELEASE_TAG}" python/dist/mujoco-*.tar.gz \
              --target "${GITHUB_SHA}" \
              --title "Python sdist ${GITHUB_SHA::7}" \
              --notes "Automated Python source distribution for commit ${GITHUB_SHA}." \
              --prerelease
          fi
